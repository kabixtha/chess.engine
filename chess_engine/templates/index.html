<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chess Engine</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',sans-serif;background:#0e0e10;color:#e8e8ec;-webkit-font-smoothing:antialiased}
button{cursor:pointer;font:inherit;border:none;background:none}

.app{display:flex;flex-direction:column;height:100dvh;max-width:700px;margin:0 auto}

.header{display:flex;align-items:center;justify-content:space-between;padding:.875rem 1.25rem;border-bottom:1px solid #2e2e34;background:#17171a;flex-shrink:0}
.header-title{display:flex;align-items:center;gap:.5rem;font-weight:700;font-size:1rem}
.header-title span{font-size:1.3rem}
.theme-btn{width:32px;height:32px;border-radius:50%;border:1px solid #2e2e34;color:#8a8a92;display:flex;align-items:center;justify-content:center;transition:background 150ms}
.theme-btn:hover{background:#1e1e22;color:#e8e8ec}

[data-theme="light"] body{background:#f5f5f0;color:#1a1a1e}
[data-theme="light"] .header{background:#fff;border-color:#d4d4cc}
[data-theme="light"] .messages{background:#f5f5f0}
[data-theme="light"] .msg-bot{background:#fff;border-color:#d4d4cc;color:#1a1a1e}
[data-theme="light"] .msg-user img{border-color:#d4d4cc}
[data-theme="light"] .input-area{background:#fff;border-color:#d4d4cc}
[data-theme="light"] .paste-zone{border-color:#d4d4cc;background:#f5f5f0}
[data-theme="light"] .paste-zone:focus-within,[data-theme="light"] .paste-zone.active{border-color:#2563eb;background:#eff6ff}
[data-theme="light"] .send-btn{background:#2563eb}
[data-theme="light"] .send-btn:hover{background:#1d4ed8}
[data-theme="light"] .side-toggle button{border-color:#d4d4cc;color:#6a6a72;background:#f0f0eb}
[data-theme="light"] .side-toggle button.active{border-color:#2563eb;background:#eff6ff;color:#2563eb}

.messages{flex:1;overflow-y:auto;padding:1.25rem;display:flex;flex-direction:column;gap:1rem;background:#0e0e10}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-track{background:transparent}
.messages::-webkit-scrollbar-thumb{background:#2e2e34;border-radius:99px}

.msg-bot{background:#17171a;border:1px solid #2e2e34;border-radius:12px 12px 12px 4px;padding:.875rem 1rem;max-width:90%;font-size:.9rem;line-height:1.6;color:#e8e8ec}
.msg-bot .move-big{font-family:'JetBrains Mono',monospace;font-size:2rem;font-weight:700;color:#f0c040;display:block;margin:.25rem 0}
.msg-bot .eval{font-size:.85rem;color:#8a8a92;margin-top:.25rem}
.msg-bot .eval .pos{color:#4caf82;font-weight:600}
.msg-bot .eval .neg{color:#e05a5a;font-weight:600}
.msg-bot .eval .mate{color:#f0c040;font-weight:700}
.msg-bot .fen-line{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:#50505a;margin-top:.5rem;word-break:break-all;cursor:pointer;padding:.3rem .5rem;background:#1e1e22;border-radius:6px;transition:background 150ms}
.msg-bot .fen-line:hover{background:#252529;color:#8a8a92}
.msg-bot strong{color:#e8e8ec}
.msg-bot .label{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#50505a;display:block;margin-bottom:.15rem}

.msg-user{align-self:flex-end;max-width:85%}
.msg-user img{border-radius:10px;max-height:260px;width:auto;max-width:100%;border:1px solid #2e2e34;display:block}
.msg-user .img-caption{font-size:.75rem;color:#50505a;text-align:right;margin-top:.25rem}

.msg-loading{background:#17171a;border:1px solid #2e2e34;border-radius:12px 12px 12px 4px;padding:.875rem 1rem;width:fit-content}
.dots{display:flex;gap:5px;align-items:center}
.dots span{width:7px;height:7px;border-radius:50%;background:#4f8ef0;animation:dot 1.2s ease-in-out infinite}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}

.msg-welcome{text-align:center;color:#50505a;font-size:.85rem;padding:1rem 0}
.msg-welcome .icon{font-size:2.5rem;display:block;margin-bottom:.5rem}

.input-area{flex-shrink:0;border-top:1px solid #2e2e34;background:#17171a;padding:.875rem 1rem}

.side-toggle{display:flex;gap:.5rem;margin-bottom:.625rem}
.side-toggle button{flex:1;padding:.4rem .75rem;border-radius:8px;border:1px solid #2e2e34;background:#1e1e22;color:#8a8a92;font-size:.8rem;font-weight:500;transition:all 150ms}
.side-toggle button.active{border-color:#4f8ef0;background:rgba(79,142,240,.12);color:#4f8ef0}

.input-row{display:flex;gap:.5rem;align-items:flex-end}

.paste-zone{flex:1;min-height:48px;max-height:120px;border:1.5px dashed #2e2e34;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:.625rem .875rem;cursor:pointer;transition:border-color 180ms,background 180ms;position:relative;overflow:hidden;gap:.625rem}
.paste-zone:focus-within,.paste-zone.active{border-color:#4f8ef0;background:rgba(79,142,240,.08)}
.paste-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.paste-zone .pz-thumb{width:36px;height:36px;border-radius:6px;object-fit:cover;flex-shrink:0;display:none}
.paste-zone .pz-thumb.visible{display:block}
.paste-zone .pz-text{font-size:.825rem;color:#8a8a92;pointer-events:none;white-space:nowrap}
.paste-zone .pz-text strong{color:#e8e8ec}
.paste-zone .pz-clear{position:absolute;top:4px;right:6px;font-size:.75rem;color:#50505a;z-index:2;cursor:pointer;padding:2px 4px;background:#1e1e22;border-radius:4px;display:none}
.paste-zone .pz-clear.visible{display:block}

.send-btn{width:48px;height:48px;border-radius:10px;background:#4f8ef0;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 150ms,opacity 150ms,transform 80ms}
.send-btn:hover:not(:disabled){background:#3a7ae0}
.send-btn:active:not(:disabled){transform:scale(.95)}
.send-btn:disabled{opacity:.4;cursor:not-allowed}

.hint-text{font-size:.72rem;color:#50505a;text-align:center;margin-top:.4rem}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-title">
      <span>♚</span> Chess Engine
    </div>
    <button class="theme-btn" data-theme-toggle aria-label="Toggle theme">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>

  <div class="messages" id="messages">
    <div class="msg-welcome">
      <span class="icon">♟</span>
      Paste a chess board screenshot and I'll find the best move.<br/>
      Press <strong>Ctrl+V</strong> anywhere or click the box below.
    </div>
  </div>

  <div class="input-area">
    <div class="side-toggle">
      <button class="active" data-side="white" id="btnWhite">♔ I'm White</button>
      <button data-side="black" id="btnBlack">♚ I'm Black</button>
    </div>
    <div class="input-row">
      <div class="paste-zone" id="pasteZone" tabindex="0" aria-label="Paste or upload board screenshot">
        <input type="file" id="fileInput" accept="image/*"/>
        <img class="pz-thumb" id="pzThumb" alt=""/>
        <span class="pz-text" id="pzText"><strong>Ctrl+V</strong> to paste &nbsp;·&nbsp; or click to browse</span>
        <span class="pz-clear" id="pzClear">✕ remove</span>
      </div>
      <button class="send-btn" id="sendBtn" disabled aria-label="Analyze">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div class="hint-text">Result shown in <strong>bold</strong> chess notation — e.g. <strong>Nf3</strong>, <strong>exd5</strong>, <strong>O-O</strong></div>
  </div>
</div>

<script>
(function(){
  const root = document.documentElement;
  let theme = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  root.setAttribute('data-theme', theme);
  const themeBtn = document.querySelector('[data-theme-toggle]');
  function setIcon(){themeBtn.innerHTML = theme==='dark'
    ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
    : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';}
  setIcon();
  themeBtn.addEventListener('click',()=>{theme=theme==='dark'?'light':'dark';root.setAttribute('data-theme',theme);setIcon();});

  let file = null;
  let side = 'white';

  const msgs      = document.getElementById('messages');
  const pasteZone = document.getElementById('pasteZone');
  const fileInput = document.getElementById('fileInput');
  const pzThumb   = document.getElementById('pzThumb');
  const pzText    = document.getElementById('pzText');
  const pzClear   = document.getElementById('pzClear');
  const sendBtn   = document.getElementById('sendBtn');
  const btnWhite  = document.getElementById('btnWhite');
  const btnBlack  = document.getElementById('btnBlack');

  [btnWhite, btnBlack].forEach(b => b.addEventListener('click', () => {
    side = b.dataset.side;
    btnWhite.classList.toggle('active', side==='white');
    btnBlack.classList.toggle('active', side==='black');
  }));

  function setFile(f){
    if(!f || !f.type.startsWith('image/')) return;
    if(f.size > 10*1024*1024){ addBotMsg('❌ File too large. Max 10 MB.', true); return; }
    file = f;
    const url = URL.createObjectURL(f);
    pzThumb.src = url;
    pzThumb.classList.add('visible');
    pzText.style.display = 'none';
    pzClear.classList.add('visible');
    sendBtn.disabled = false;
    pasteZone.classList.add('active');
  }

  function clearFile(){
    file = null;
    pzThumb.src = '';
    pzThumb.classList.remove('visible');
    pzText.style.display = '';
    pzClear.classList.remove('visible');
    sendBtn.disabled = true;
    pasteZone.classList.remove('active');
    fileInput.value = '';
  }

  pzClear.addEventListener('click', e=>{ e.stopPropagation(); clearFile(); });
  fileInput.addEventListener('change', ()=>{ if(fileInput.files[0]) setFile(fileInput.files[0]); });
  pasteZone.addEventListener('dragover', e=>{e.preventDefault();pasteZone.classList.add('active');});
  pasteZone.addEventListener('dragleave', ()=>pasteZone.classList.remove('active'));
  pasteZone.addEventListener('drop', e=>{e.preventDefault();if(e.dataTransfer.files[0])setFile(e.dataTransfer.files[0]);});
  pasteZone.addEventListener('keydown', e=>{if(e.key==='Enter'||e.key===' ')fileInput.click();});

  // Global Ctrl+V paste — works anywhere on the page
  document.addEventListener('paste', e=>{
    const items = e.clipboardData?.items;
    if(!items) return;
    for(const item of items){
      if(item.type.startsWith('image/')){
        setFile(item.getAsFile());
        break;
      }
    }
  });

  function addUserImg(url, name){
    const d = document.createElement('div');
    d.className = 'msg-user';
    d.innerHTML = `<img src="${url}" alt="Board screenshot"/><div class="img-caption">${name} · as ${side==='white'?'♔ White':'♚ Black'}</div>`;
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function addLoading(){
    const d = document.createElement('div');
    d.className = 'msg-loading';
    d.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
    return d;
  }

  function addBotMsg(html, isError=false){
    const d = document.createElement('div');
    d.className = 'msg-bot';
    if(isError) d.style.borderColor = 'rgba(224,90,90,.4)';
    d.innerHTML = html;
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
    const fen = d.querySelector('.fen-line');
    if(fen) fen.addEventListener('click', ()=>{
      navigator.clipboard.writeText(fen.dataset.fen||'').then(()=>{
        const orig = fen.textContent;
        fen.textContent = '✓ Copied!';
        setTimeout(()=>{ fen.textContent = orig; }, 2000);
      });
    });
  }

  function formatEval(ev){
    if(!ev||ev==='N/A') return `<span>${ev||'N/A'}</span>`;
    if(ev.toLowerCase().includes('mate')) return `<span class="mate">${ev}</span>`;
    if(ev.startsWith('+')) return `<span class="pos">${ev}</span>`;
    if(ev.startsWith('-')) return `<span class="neg">${ev}</span>`;
    return `<span>${ev}</span>`;
  }

  sendBtn.addEventListener('click', analyze);

  async function analyze(){
    if(!file) return;
    const imgUrl = URL.createObjectURL(file);
    addUserImg(imgUrl, file.name||'screenshot.png');
    const loader = addLoading();
    sendBtn.disabled = true;
    const savedFile = file;
    clearFile();

    const fd = new FormData();
    fd.append('image', savedFile);
    fd.append('side', side);

    try {
      const res  = await fetch('/analyze/', {method:'POST', body:fd});
      const data = await res.json();
      loader.remove();
      if(!res.ok){
        addBotMsg(`<strong>⚠ Error:</strong> ${data.error||'Unknown error.'}`, true);
        return;
      }
      addBotMsg(`
        <span class="label">Best Move</span>
        <strong class="move-big">${data.best_move||'—'}</strong>
        <div class="eval">
          Evaluation: ${formatEval(data.evaluation)}
          &nbsp;·&nbsp; ${side==='white'?'♔ White':'♚ Black'}
          &nbsp;·&nbsp; UCI: <code>${data.move_uci||'—'}</code>
        </div>
        <div class="fen-line" data-fen="${data.fen||''}" title="Click to copy FEN">${data.fen||'—'}</div>
      `);
    } catch(err){
      loader.remove();
      addBotMsg('❌ Network error — could not reach the server.', true);
    } finally {
      sendBtn.disabled = false;
    }
  }
})();
</script>
</body>
</html>
